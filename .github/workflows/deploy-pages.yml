name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build client for GitHub Pages
        env:
          GITHUB_PAGES: "true"
          # Set in repo Settings → Secrets → Actions after the API is live, e.g.
          # https://company-hub-api.onrender.com/api
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Must match Render HUB_TOKEN_SECRET
          VITE_HUB_TOKEN_SECRET: ${{ secrets.VITE_HUB_TOKEN_SECRET }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
