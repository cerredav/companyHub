# Blueprint: https://dashboard.render.com/blueprints
# Persistent disk requires a paid web plan (Starter+). Free tier loses SQLite on restart.
services:
  - type: web
    name: company-hub-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SQLITE_PATH
        value: /var/data/hub.sqlite
      - key: CORS_ORIGINS
        # Pages site Origin only (path /companyHub/ is not part of Origin)
        value: https://cerredav.github.io
      - key: HUB_PASSWORD
        sync: false
      - key: HUB_TOKEN_SECRET
        sync: false
    disk:
      name: company-hub-data
      mountPath: /var/data
      sizeGB: 1
